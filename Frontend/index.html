    <script>
      // Service worker cleanup — IIFE for isolation
      (function() {
        'use strict';
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register = function() {
            return Promise.reject(new Error('Service workers disabled'));
          };
          try {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
              registrations.forEach(function(reg) { reg.unregister().catch(function() {}); });
            }).catch(function() {});
          } catch(e) {}
        }

        // Error suppression for stale worker artifacts
        function shouldSuppress(msg) {
          var str = String(msg).toLowerCase();
          return str.includes('worker.js') || str.includes('site.webmanifest') || str.includes('service worker');
        }
        var origError = console.error;
        console.error = function() {
          var msg = Array.prototype.map.call(arguments, String).join(' ');
          if (!shouldSuppress(msg)) origError.apply(console, arguments);
        };
        window.addEventListener('unhandledrejection', function(e) {
          try {
            var r = e.reason;
            if (r && shouldSuppress(r.message || String(r))) { e.preventDefault(); }
          } catch(err) {}
        }, true);
      })();
    </script>
